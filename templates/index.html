<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Artist Sync</title>
    <style>
      :root {
        --excel-green: #107c41;
        --excel-green-dark: #0b5b30;
        --excel-green-soft: #e7f5ed;
        --text: #1f2937;
        --white: #ffffff;
        --danger: #b42318;
        --ok: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #f0faf4 0%, #e3f3ea 100%);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 760px;
        background: var(--white);
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(16, 124, 65, 0.12);
        overflow: hidden;
      }

      .header {
        padding: 20px 24px;
        background: linear-gradient(90deg, var(--excel-green) 0%, #1a8f4f 100%);
        color: var(--white);
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }

      .header p {
        margin: 8px 0 0;
        opacity: 0.9;
      }

      .content {
        padding: 24px;
      }

      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 2px solid #d1e8d9;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: var(--excel-green);
        box-shadow: 0 0 0 3px rgba(16, 124, 65, 0.15);
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 14px 16px;
        background: var(--excel-green);
        color: var(--white);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn:hover {
        background: var(--excel-green-dark);
      }

      .btn:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .result {
        margin-top: 18px;
        border-radius: 12px;
        padding: 14px;
        background: var(--excel-green-soft);
        border: 1px solid #c7e7d3;
        display: none;
        white-space: pre-wrap;
      }

      .result.error {
        background: #fdeceb;
        border-color: #f5c2bf;
        color: var(--danger);
      }

      .result.ok {
        color: var(--ok);
      }

      .links {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .link-btn {
        display: inline-block;
        text-decoration: none;
        border-radius: 10px;
        padding: 9px 12px;
        font-weight: 600;
        border: 1px solid #b6dec6;
        color: #0a5b2f;
        background: #f3fcf7;
      }

      .city-tools {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .city-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .city-chip {
        border: 1px solid #b6dec6;
        border-radius: 999px;
        padding: 6px 12px;
        background: #f3fcf7;
        color: #0a5b2f;
        cursor: pointer;
        font-size: 14px;
      }

      .city-chip.active {
        background: #107c41;
        color: #fff;
        border-color: #107c41;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="header">
          <h1>Excel Artist Budget Sync</h1>
          <p>Два посилання на Google Sheets. Якщо в загальній книзі кілька міст — завантаж міста та обери аркуші (або «Вибрати всі»).</p>
        </div>

        <div class="content">
          <div class="field">
            <label for="sourceUrl">Посилання на загальну таблицю</label>
            <input
              id="sourceUrl"
              type="url"
              placeholder="https://docs.google.com/spreadsheets/d/..."
              required
            />
          </div>

          <div class="field">
            <label for="targetUrl">Посилання на таблицю артиста</label>
            <input
              id="targetUrl"
              type="url"
              placeholder="(опційно) https://docs.google.com/spreadsheets/d/..."
            />
          </div>

          <div class="field">
            <label>Міста в загальній таблиці (аркуші)</label>
            <div class="city-tools">
              <button id="loadCitiesBtn" class="link-btn" type="button">Завантажити міста</button>
              <button id="toggleAllCitiesBtn" class="link-btn" type="button">Вибрати всі</button>
            </div>
            <div id="cityList" class="city-list"></div>
            <p style="margin: 8px 0 0; font-size: 13px; color: #4b5563">
              Якщо кнопку «Завантажити міста» не натискати — береться перший аркуш джерела (як раніше).
            </p>
          </div>

          <button id="runBtn" class="btn">Синхронізувати</button>
          <div id="result" class="result"></div>
        </div>
      </div>
    </div>

    <script>
      const runBtn = document.getElementById("runBtn");
      const resultBox = document.getElementById("result");
      const sourceInput = document.getElementById("sourceUrl");
      const targetInput = document.getElementById("targetUrl");
      const loadCitiesBtn = document.getElementById("loadCitiesBtn");
      const toggleAllCitiesBtn = document.getElementById("toggleAllCitiesBtn");
      const cityList = document.getElementById("cityList");
      const selectedCities = new Set();
      let citiesLoaded = [];

      function renderCityButtons() {
        cityList.innerHTML = "";
        citiesLoaded.forEach((city) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `city-chip ${selectedCities.has(city) ? "active" : ""}`;
          btn.textContent = city;
          btn.addEventListener("click", () => {
            if (selectedCities.has(city)) selectedCities.delete(city);
            else selectedCities.add(city);
            renderCityButtons();
          });
          cityList.appendChild(btn);
        });
      }

      async function loadCities() {
        const source_url = sourceInput.value.trim();
        if (!source_url) {
          showResult("Спочатку встав посилання на загальну таблицю.", true);
          return;
        }
        const response = await fetch("/cities-ui", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ source_url }),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Не вдалося завантажити міста");
        }
        citiesLoaded = data.cities || [];
        selectedCities.clear();
        if (citiesLoaded.length === 1) {
          selectedCities.add(citiesLoaded[0]);
        }
        renderCityButtons();
      }

      loadCitiesBtn.addEventListener("click", async () => {
        try {
          await loadCities();
          showResult(`Знайдено міст-аркушів: ${citiesLoaded.length}`, false);
        } catch (err) {
          showResult(`Помилка: ${err.message}`, true);
        }
      });

      toggleAllCitiesBtn.addEventListener("click", () => {
        if (!citiesLoaded.length) return;
        if (selectedCities.size === citiesLoaded.length) {
          selectedCities.clear();
          toggleAllCitiesBtn.textContent = "Вибрати всі";
        } else {
          citiesLoaded.forEach((c) => selectedCities.add(c));
          toggleAllCitiesBtn.textContent = "Зняти всі";
        }
        renderCityButtons();
      });

      sourceInput.addEventListener("change", async () => {
        citiesLoaded = [];
        selectedCities.clear();
        cityList.innerHTML = "";
      });

      function showResult(text, isError = false, links = null) {
        resultBox.style.display = "block";
        resultBox.className = `result ${isError ? "error" : "ok"}`;
        resultBox.textContent = text;

        if (links && !isError) {
          const linksWrap = document.createElement("div");
          linksWrap.className = "links";

          if (links.openUrl) {
            const openLink = document.createElement("a");
            openLink.className = "link-btn";
            openLink.href = links.openUrl;
            openLink.target = "_blank";
            openLink.rel = "noopener noreferrer";
            openLink.textContent = "Відкрити оновлену таблицю";
            linksWrap.appendChild(openLink);
          }

          if (links.xlsxUrl) {
            const xlsxLink = document.createElement("a");
            xlsxLink.className = "link-btn";
            xlsxLink.href = links.xlsxUrl;
            xlsxLink.target = "_blank";
            xlsxLink.rel = "noopener noreferrer";
            xlsxLink.textContent = "Скачати XLSX файл";
            linksWrap.appendChild(xlsxLink);
          }

          resultBox.appendChild(linksWrap);
        }
      }

      runBtn.addEventListener("click", async () => {
        const source_url = sourceInput.value.trim();
        const target_url = targetInput.value.trim();

        if (!source_url) {
          showResult("Заповни посилання на загальну таблицю.", true);
          return;
        }

        if (citiesLoaded.length > 0 && selectedCities.size === 0) {
          showResult("Обери хоча б одне місто або натисни «Вибрати всі».", true);
          return;
        }

        runBtn.disabled = true;
        runBtn.textContent = "Синхронізую...";
        resultBox.style.display = "none";

        try {
          const payload = {
            source_url,
            target_url,
            auto_create_target: true,
          };
          if (citiesLoaded.length > 0) {
            payload.selected_cities = Array.from(selectedCities);
          }

          const response = await fetch("/sync-ui", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error || "Помилка синхронізації");
          }

          const transformedSheets =
            data.debug && data.debug.transformed_sheets
              ? data.debug.transformed_sheets.map((s) => s.sheet).join(", ")
              : "";
          const srcSheets =
            transformedSheets
              ? `\nПеретворені аркуші: ${transformedSheets}`
              : data.debug && data.debug.source_sheets_used && data.debug.source_sheets_used.length
                ? `\nАркуші джерела: ${data.debug.source_sheets_used.join(", ")}`
                : "";

          showResult(
            `Готово!${transformedSheets ? "" : `\nЗбіглося рядків: ${data.matched_rows}\nОновлено клітинок: ${data.updated_cells}`}${srcSheets}${
              data.new_target_created
                ? "\nСтворено нову таблицю артиста з очищеної таблиці 1."
                : ""
            }${
              !transformedSheets && data.matched_rows === 0 && data.debug
                ? `\n\nДіагностика:\nsource_rows_loaded: ${data.debug.source_rows_loaded}\ndetected_source_header_row: ${data.debug.detected_source_header_row}\nsource_keys_sample: ${(data.debug.source_keys_sample || []).join(", ")}\ntarget_rows_total: ${data.debug.target_rows_total}\ndetected_target_header_row: ${data.debug.detected_target_header_row}\nname_col_idx: ${data.debug.target_name_column_index}\namount_col_idx: ${data.debug.target_amount_column_index}\nunmatched sample: ${(data.debug.unmatched_targets_sample || []).join(", ")}`
                : ""
            }`,
            false,
            {
              openUrl: data.target_open_url,
              xlsxUrl: data.target_xlsx_url,
            }
          );
        } catch (err) {
          showResult(`Помилка: ${err.message}`, true);
        } finally {
          runBtn.disabled = false;
          runBtn.textContent = "Синхронізувати";
        }
      });
    </script>
  </body>
</html>
